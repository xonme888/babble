name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: babble_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: app-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run openapi:generate
      - run: npm run openapi:validate
      - run: npm run validate:contract
      - run: npm test
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test
          DATABASE_DATABASE: babble_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
          ALLOWED_ORIGINS: http://localhost:3000

  admin:
    name: Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-admin/package-lock.json
      - run: npm ci
      - run: npm run types:generate
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  ai:
    name: AI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --frozen
      - run: ruff check src/
      - run: pytest tests/ -v

  schema-drift:
    name: Schema Drift Detection
    needs: [backend, admin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Backend dependencies
        run: npm ci
        working-directory: app-backend
      - name: Install Admin dependencies
        run: npm ci
        working-directory: app-admin
      - name: Run schema validation
        run: bash app-infrastructure/scripts/validate-schemas.sh
      - name: Check for uncommitted schema changes
        run: |
          if ! git diff --quiet app-backend/openapi.json app-admin/src/types/generated/; then
            echo "::error::Schema drift detected. Run 'bash app-infrastructure/scripts/validate-schemas.sh' locally and commit the changes."
            git diff --stat app-backend/openapi.json app-admin/src/types/generated/
            exit 1
          fi
